name: 打包生成 EXE 软件

on:
  push:
    branches: [ "main" ]  # 当你提交代码时触发打包
  workflow_dispatch:      # 允许你在页面上手动点击按钮触发打包

jobs:
  build:
    runs-on: windows-latest  # 使用微软官方的 Windows 云服务器进行打包

    steps:
    - name: 步骤 1 - 拉取仓库代码
      uses: actions/checkout@v4

    - name: 步骤 2 - 准备 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 步骤 3 - 安装打包所需的算法依赖库
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python numpy pillow psd-tools pyinstaller

    - name: 步骤 4 - 使用 PyInstaller 编译打包
      run: |
        pyinstaller --onefile --noconsole msw_aligner.py

    - name: 步骤 5 - 将打包好的 EXE 上传到 GitHub 供下载
      uses: actions/upload-artifact@v4
      with:
        name: MSW_Visual_Aligner_Software  # 下载时的压缩包名字
        path: dist/msw_aligner.exe        # 告诉 GitHub 去哪里拿生成的 exe
